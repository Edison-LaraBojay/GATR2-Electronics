name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gtest
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev cmake

      - name: Configure
        run: cmake -S common/tests -B build

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure